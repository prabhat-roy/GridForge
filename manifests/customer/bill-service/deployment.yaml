apiVersion: apps/v1
kind: Deployment
metadata:
  name: bill-service
  namespace: gridforge
  labels:
    app.kubernetes.io/name: bill-service
    app.kubernetes.io/part-of: gridforge
    gridforge.io/domain: customer
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: bill-service } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: bill-service, gridforge.io/domain: customer }
    spec:
      serviceAccountName: bill-service
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: bill-service
          image: harbor.gridforge.internal/gridforge/bill-service:latest
          ports: [{ containerPort: 50202, name: http }]
          envFrom: [{ configMapRef: { name: bill-service } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50202 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50202 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
