apiVersion: apps/v1
kind: Deployment
metadata:
  name: settlement-gateway
  namespace: gridforge
  labels:
    app.kubernetes.io/name: settlement-gateway
    app.kubernetes.io/part-of: gridforge
    gridforge.io/domain: market
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: settlement-gateway } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: settlement-gateway, gridforge.io/domain: market }
    spec:
      serviceAccountName: settlement-gateway
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: settlement-gateway
          image: harbor.gridforge.internal/gridforge/settlement-gateway:latest
          ports: [{ containerPort: 50300, name: http }]
          envFrom: [{ configMapRef: { name: settlement-gateway } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50300 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50300 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
