apiVersion: apps/v1
kind: Deployment
metadata:
  name: balancing-mechanism
  namespace: gridforge
  labels:
    app.kubernetes.io/name: balancing-mechanism
    app.kubernetes.io/part-of: gridforge
    gridforge.io/domain: market
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: balancing-mechanism } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: balancing-mechanism, gridforge.io/domain: market }
    spec:
      serviceAccountName: balancing-mechanism
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: balancing-mechanism
          image: harbor.gridforge.internal/gridforge/balancing-mechanism:latest
          ports: [{ containerPort: 50301, name: http }]
          envFrom: [{ configMapRef: { name: balancing-mechanism } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50301 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50301 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
