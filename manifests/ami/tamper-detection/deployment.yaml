apiVersion: apps/v1
kind: Deployment
metadata:
  name: tamper-detection
  namespace: gridforge
  labels:
    app.kubernetes.io/name: tamper-detection
    app.kubernetes.io/part-of: gridforge
    gridforge.io/domain: ami
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: tamper-detection } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: tamper-detection, gridforge.io/domain: ami }
    spec:
      serviceAccountName: tamper-detection
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: tamper-detection
          image: harbor.gridforge.internal/gridforge/tamper-detection:latest
          ports: [{ containerPort: 50103, name: http }]
          envFrom: [{ configMapRef: { name: tamper-detection } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50103 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50103 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
