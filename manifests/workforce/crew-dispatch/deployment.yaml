apiVersion: apps/v1
kind: Deployment
metadata:
  name: crew-dispatch
  namespace: gridforge
  labels:
    app.kubernetes.io/name: crew-dispatch
    app.kubernetes.io/part-of: gridforge
    gridforge.io/domain: workforce
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: crew-dispatch } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: crew-dispatch, gridforge.io/domain: workforce }
    spec:
      serviceAccountName: crew-dispatch
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: crew-dispatch
          image: harbor.gridforge.internal/gridforge/crew-dispatch:latest
          ports: [{ containerPort: 50261, name: http }]
          envFrom: [{ configMapRef: { name: crew-dispatch } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50261 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50261 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
