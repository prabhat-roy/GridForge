apiVersion: apps/v1
kind: Deployment
metadata:
  name: network-model
  namespace: gridforge
  labels:
    app.kubernetes.io/name: network-model
    app.kubernetes.io/part-of: gridforge
    gridforge.io/domain: transmission
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: network-model } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: network-model, gridforge.io/domain: transmission }
    spec:
      serviceAccountName: network-model
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: network-model
          image: harbor.gridforge.internal/gridforge/network-model:latest
          ports: [{ containerPort: 50080, name: http }]
          envFrom: [{ configMapRef: { name: network-model } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50080 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50080 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
