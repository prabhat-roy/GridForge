apiVersion: apps/v1
kind: Deployment
metadata:
  name: generation-forecast
  namespace: gridforge
  labels:
    app.kubernetes.io/name: generation-forecast
    app.kubernetes.io/part-of: gridforge
    gridforge.io/domain: analytics
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: generation-forecast } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: generation-forecast, gridforge.io/domain: analytics }
    spec:
      serviceAccountName: generation-forecast
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: generation-forecast
          image: harbor.gridforge.internal/gridforge/generation-forecast:latest
          ports: [{ containerPort: 50281, name: http }]
          envFrom: [{ configMapRef: { name: generation-forecast } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50281 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50281 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
