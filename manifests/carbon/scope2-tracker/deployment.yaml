apiVersion: apps/v1
kind: Deployment
metadata:
  name: scope2-tracker
  namespace: gridforge
  labels:
    app.kubernetes.io/name: scope2-tracker
    app.kubernetes.io/part-of: gridforge
    gridforge.io/domain: carbon
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: scope2-tracker } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: scope2-tracker, gridforge.io/domain: carbon }
    spec:
      serviceAccountName: scope2-tracker
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: scope2-tracker
          image: harbor.gridforge.internal/gridforge/scope2-tracker:latest
          ports: [{ containerPort: 50241, name: http }]
          envFrom: [{ configMapRef: { name: scope2-tracker } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50241 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50241 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
