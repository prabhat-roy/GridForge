apiVersion: apps/v1
kind: Deployment
metadata:
  name: bess-service
  namespace: gridforge
  labels:
    app.kubernetes.io/name: bess-service
    app.kubernetes.io/part-of: gridforge
    gridforge.io/domain: battery
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: bess-service } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: bess-service, gridforge.io/domain: battery }
    spec:
      serviceAccountName: bess-service
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: bess-service
          image: harbor.gridforge.internal/gridforge/bess-service:latest
          ports: [{ containerPort: 50160, name: http }]
          envFrom: [{ configMapRef: { name: bess-service } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50160 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50160 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
