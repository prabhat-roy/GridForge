apiVersion: apps/v1
kind: Deployment
metadata:
  name: charge-scheduler
  namespace: gridforge
  labels:
    app.kubernetes.io/name: charge-scheduler
    app.kubernetes.io/part-of: gridforge
    gridforge.io/domain: battery
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: charge-scheduler } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: charge-scheduler, gridforge.io/domain: battery }
    spec:
      serviceAccountName: charge-scheduler
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: charge-scheduler
          image: harbor.gridforge.internal/gridforge/charge-scheduler:latest
          ports: [{ containerPort: 50162, name: http }]
          envFrom: [{ configMapRef: { name: charge-scheduler } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50162 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50162 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
