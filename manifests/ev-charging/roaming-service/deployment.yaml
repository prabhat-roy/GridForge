apiVersion: apps/v1
kind: Deployment
metadata:
  name: roaming-service
  namespace: gridforge
  labels:
    app.kubernetes.io/name: roaming-service
    app.kubernetes.io/part-of: gridforge
    gridforge.io/domain: ev-charging
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: roaming-service } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: roaming-service, gridforge.io/domain: ev-charging }
    spec:
      serviceAccountName: roaming-service
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: roaming-service
          image: harbor.gridforge.internal/gridforge/roaming-service:latest
          ports: [{ containerPort: 50181, name: http }]
          envFrom: [{ configMapRef: { name: roaming-service } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50181 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50181 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
