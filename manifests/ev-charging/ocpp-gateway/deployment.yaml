apiVersion: apps/v1
kind: Deployment
metadata:
  name: ocpp-gateway
  namespace: gridforge
  labels:
    app.kubernetes.io/name: ocpp-gateway
    app.kubernetes.io/part-of: gridforge
    gridforge.io/domain: ev-charging
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: ocpp-gateway } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: ocpp-gateway, gridforge.io/domain: ev-charging }
    spec:
      serviceAccountName: ocpp-gateway
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: ocpp-gateway
          image: harbor.gridforge.internal/gridforge/ocpp-gateway:latest
          ports: [{ containerPort: 50180, name: http }]
          envFrom: [{ configMapRef: { name: ocpp-gateway } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50180 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50180 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
