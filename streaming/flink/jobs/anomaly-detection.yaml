apiVersion: flink.apache.org/v1beta1
kind: FlinkSessionJob
metadata: { name: gridforge-anomaly-detection, namespace: gridforge }
spec:
  deploymentName: gridforge-flink
  job:
    jarURI: s3://gridforge-flink-jobs/anomaly-detection.jar
    parallelism: 6
    upgradeMode: savepoint
    args: ["--source-topic", "gridforge.metrics.raw", "--sink-topic", "gridforge.alerts.anomaly"]
