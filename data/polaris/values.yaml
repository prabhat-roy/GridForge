# Apache Polaris — Iceberg REST catalog with RBAC + multi-engine support
image: { repository: apache/polaris, tag: latest }
polaris:
  realm: gridforge
  storage:
    s3: { endpoint: http://minio.gridforge.svc:9000, region: us-east-1, bucket: gridforge-iceberg-warehouse }
ingress: { enabled: true, hosts: [{ host: polaris.gridforge.internal }] }
