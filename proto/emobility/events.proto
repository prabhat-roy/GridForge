syntax = "proto3";
package gridforge.emobility.v1;
option go_package = "github.com/prabhat-roy/GridForge/proto/emobility/v1;emobility_v1";
import "google/protobuf/timestamp.proto";

message EmobilityCreatedEvent { string id = 1; string tenant_id = 2; google.protobuf.Timestamp ts = 3; }
message EmobilityUpdatedEvent { string id = 1; string tenant_id = 2; google.protobuf.Timestamp ts = 3; }
message EmobilityDeletedEvent { string id = 1; string tenant_id = 2; google.protobuf.Timestamp ts = 3; }
