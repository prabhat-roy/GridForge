syntax = "proto3";
package gridforge.trading.v1;
option go_package = "github.com/prabhat-roy/GridForge/proto/trading/v1;trading_v1";
import "google/protobuf/timestamp.proto";

message TradingCreatedEvent { string id = 1; string tenant_id = 2; google.protobuf.Timestamp ts = 3; }
message TradingUpdatedEvent { string id = 1; string tenant_id = 2; google.protobuf.Timestamp ts = 3; }
message TradingDeletedEvent { string id = 1; string tenant_id = 2; google.protobuf.Timestamp ts = 3; }
