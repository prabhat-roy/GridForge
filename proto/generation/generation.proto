syntax = "proto3";

package gridforge.generation.v1;

option go_package = "github.com/prabhat-roy/GridForge/proto/generation/v1;generation_v1";
option java_multiple_files = true;
option java_package = "com.gridforge.generation.v1";

import "common/types.proto";
import "google/protobuf/timestamp.proto";

// generation service for GridForge
service GenerationService {
  rpc Get(GetRequest) returns (GetResponse);
  rpc List(ListRequest) returns (ListResponse);
  rpc Create(CreateRequest) returns (CreateResponse);
  rpc Update(UpdateRequest) returns (UpdateResponse);
  rpc Delete(DeleteRequest) returns (DeleteResponse);
}

message Generation {
  string id = 1;
  string tenant_id = 2;
  google.protobuf.Timestamp created_at = 3;
  google.protobuf.Timestamp updated_at = 4;
  map<string, string> attributes = 5;
}

message GetRequest    { string id = 1; }
message GetResponse   { Generation entity = 1; }
message ListRequest   { string tenant_id = 1; common.Pagination page = 2; }
message ListResponse  { repeated Generation items = 1; common.Pagination page = 2; }
message CreateRequest { Generation entity = 1; }
message CreateResponse{ Generation entity = 1; }
message UpdateRequest { Generation entity = 1; }
message UpdateResponse{ Generation entity = 1; }
message DeleteRequest { string id = 1; }
message DeleteResponse{ bool ok = 1; }
