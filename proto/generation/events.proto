syntax = "proto3";
package gridforge.generation.v1;
option go_package = "github.com/prabhat-roy/GridForge/proto/generation/v1;generation_v1";
import "google/protobuf/timestamp.proto";

message GenerationCreatedEvent { string id = 1; string tenant_id = 2; google.protobuf.Timestamp ts = 3; }
message GenerationUpdatedEvent { string id = 1; string tenant_id = 2; google.protobuf.Timestamp ts = 3; }
message GenerationDeletedEvent { string id = 1; string tenant_id = 2; google.protobuf.Timestamp ts = 3; }
