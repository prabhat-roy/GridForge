syntax = "proto3";

package gridforge.dr.v1;

option go_package = "github.com/prabhat-roy/GridForge/proto/dr/v1;dr_v1";
option java_multiple_files = true;
option java_package = "com.gridforge.dr.v1";

import "common/types.proto";
import "google/protobuf/timestamp.proto";

// dr service for GridForge
service DrService {
  rpc Get(GetRequest) returns (GetResponse);
  rpc List(ListRequest) returns (ListResponse);
  rpc Create(CreateRequest) returns (CreateResponse);
  rpc Update(UpdateRequest) returns (UpdateResponse);
  rpc Delete(DeleteRequest) returns (DeleteResponse);
}

message Dr {
  string id = 1;
  string tenant_id = 2;
  google.protobuf.Timestamp created_at = 3;
  google.protobuf.Timestamp updated_at = 4;
  map<string, string> attributes = 5;
}

message GetRequest    { string id = 1; }
message GetResponse   { Dr entity = 1; }
message ListRequest   { string tenant_id = 1; common.Pagination page = 2; }
message ListResponse  { repeated Dr items = 1; common.Pagination page = 2; }
message CreateRequest { Dr entity = 1; }
message CreateResponse{ Dr entity = 1; }
message UpdateRequest { Dr entity = 1; }
message UpdateResponse{ Dr entity = 1; }
message DeleteRequest { string id = 1; }
message DeleteResponse{ bool ok = 1; }
