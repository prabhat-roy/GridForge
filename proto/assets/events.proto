syntax = "proto3";
package gridforge.assets.v1;
option go_package = "github.com/prabhat-roy/GridForge/proto/assets/v1;assets_v1";
import "google/protobuf/timestamp.proto";

message AssetsCreatedEvent { string id = 1; string tenant_id = 2; google.protobuf.Timestamp ts = 3; }
message AssetsUpdatedEvent { string id = 1; string tenant_id = 2; google.protobuf.Timestamp ts = 3; }
message AssetsDeletedEvent { string id = 1; string tenant_id = 2; google.protobuf.Timestamp ts = 3; }
