syntax = "proto3";

package gridforge.crm.v1;

option go_package = "github.com/prabhat-roy/GridForge/proto/crm/v1;crm_v1";
option java_multiple_files = true;
option java_package = "com.gridforge.crm.v1";

import "common/types.proto";
import "google/protobuf/timestamp.proto";

// crm service for GridForge
service CrmService {
  rpc Get(GetRequest) returns (GetResponse);
  rpc List(ListRequest) returns (ListResponse);
  rpc Create(CreateRequest) returns (CreateResponse);
  rpc Update(UpdateRequest) returns (UpdateResponse);
  rpc Delete(DeleteRequest) returns (DeleteResponse);
}

message Crm {
  string id = 1;
  string tenant_id = 2;
  google.protobuf.Timestamp created_at = 3;
  google.protobuf.Timestamp updated_at = 4;
  map<string, string> attributes = 5;
}

message GetRequest    { string id = 1; }
message GetResponse   { Crm entity = 1; }
message ListRequest   { string tenant_id = 1; common.Pagination page = 2; }
message ListResponse  { repeated Crm items = 1; common.Pagination page = 2; }
message CreateRequest { Crm entity = 1; }
message CreateResponse{ Crm entity = 1; }
message UpdateRequest { Crm entity = 1; }
message UpdateResponse{ Crm entity = 1; }
message DeleteRequest { string id = 1; }
message DeleteResponse{ bool ok = 1; }
