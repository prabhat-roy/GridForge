syntax = "proto3";
package gridforge.tariff.v1;
option go_package = "github.com/prabhat-roy/GridForge/proto/tariff/v1;tariff_v1";
import "google/protobuf/timestamp.proto";

message TariffCreatedEvent { string id = 1; string tenant_id = 2; google.protobuf.Timestamp ts = 3; }
message TariffUpdatedEvent { string id = 1; string tenant_id = 2; google.protobuf.Timestamp ts = 3; }
message TariffDeletedEvent { string id = 1; string tenant_id = 2; google.protobuf.Timestamp ts = 3; }
