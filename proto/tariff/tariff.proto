syntax = "proto3";

package gridforge.tariff.v1;

option go_package = "github.com/prabhat-roy/GridForge/proto/tariff/v1;tariff_v1";
option java_multiple_files = true;
option java_package = "com.gridforge.tariff.v1";

import "common/types.proto";
import "google/protobuf/timestamp.proto";

// tariff service for GridForge
service TariffService {
  rpc Get(GetRequest) returns (GetResponse);
  rpc List(ListRequest) returns (ListResponse);
  rpc Create(CreateRequest) returns (CreateResponse);
  rpc Update(UpdateRequest) returns (UpdateResponse);
  rpc Delete(DeleteRequest) returns (DeleteResponse);
}

message Tariff {
  string id = 1;
  string tenant_id = 2;
  google.protobuf.Timestamp created_at = 3;
  google.protobuf.Timestamp updated_at = 4;
  map<string, string> attributes = 5;
}

message GetRequest    { string id = 1; }
message GetResponse   { Tariff entity = 1; }
message ListRequest   { string tenant_id = 1; common.Pagination page = 2; }
message ListResponse  { repeated Tariff items = 1; common.Pagination page = 2; }
message CreateRequest { Tariff entity = 1; }
message CreateResponse{ Tariff entity = 1; }
message UpdateRequest { Tariff entity = 1; }
message UpdateResponse{ Tariff entity = 1; }
message DeleteRequest { string id = 1; }
message DeleteResponse{ bool ok = 1; }
