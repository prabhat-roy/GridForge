apiVersion: networking.istio.io/v1
kind: Gateway
metadata: { name: gridforge, namespace: istio-system }
spec:
  selector: { istio: ingressgateway }
  servers:
    - port: { number: 443, name: https, protocol: HTTPS }
      tls: { mode: SIMPLE, credentialName: gridforge-tls }
      hosts: ["api.gridforge.com","ops.gridforge.com"]
